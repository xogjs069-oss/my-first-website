<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1면 발란싱 벡터 계산기</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        h2 { text-align: center; color: #333; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        label { font-weight: bold; color: #555; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100px; text-align: right; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        canvas { background-color: #fff; border: 1px solid #ccc; display: block; margin: 20px auto; border-radius: 5px; }
        .result-box { background-color: #e9ecef; padding: 15px; border-radius: 5px; margin-top: 20px; }
        .result-item { margin: 5px 0; font-size: 16px; }
        .legend { font-size: 12px; text-align: center; margin-top: 5px; color: #666; }
        .color-box { display: inline-block; width: 10px; height: 10px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ 1면 발란싱 도우미</h2>
    
    <div class="input-group">
        <label>1. 초기 진동 (O) 진폭:</label>
        <input type="number" id="ampO" placeholder="예: 50">
    </div>
    <div class="input-group">
        <label>1. 초기 진동 (O) 위상(°):</label>
        <input type="number" id="phaseO" placeholder="예: 240">
    </div>
    <hr>
    <div class="input-group">
        <label>2. 시험 중량 (Trial Weight) 무게:</label>
        <input type="number" id="weightT" placeholder="예: 10">
    </div>
    <div class="input-group">
        <label>3. 시험 후 진동 (O+T) 진폭:</label>
        <input type="number" id="ampOT" placeholder="예: 80">
    </div>
    <div class="input-group">
        <label>3. 시험 후 진동 (O+T) 위상(°):</label>
        <input type="number" id="phaseOT" placeholder="예: 330">
    </div>

    <button onclick="calculateBalancing()">계산 및 작도 실행 (Calculate)</button>

    <canvas id="vectorGraph" width="350" height="350"></canvas>
    <div class="legend">
        <span class="color-box" style="background:blue;"></span>초기(O) 
        <span class="color-box" style="background:green; margin-left:10px;"></span>시험후(O+T) 
        <span class="color-box" style="background:red; margin-left:10px;"></span>효과(T)
    </div>

    <div class="result-box" id="resultArea" style="display:none;">
        <h3>📊 분석 결과</h3>
        <p class="result-item">🔹 <b>교정 중량 (Correction Weight):</b> <span id="resWeight" style="color: #d9534f; font-weight:bold;"></span></p>
        <p class="result-item">🔹 <b>이동 각도 (Angle Shift):</b> <span id="resAngleDiff"></span></p>
        <p class="result-item">🔹 <b>작업 지시:</b> <br><span id="resInstruction" style="background: #fff3cd; padding: 5px; display:inline-block; margin-top:5px;"></span></p>
    </div>
</div>

<script>
    function calculateBalancing() {
        // 1. 입력값 가져오기
        const ampO = parseFloat(document.getElementById('ampO').value);
        const phaseO = parseFloat(document.getElementById('phaseO').value);
        const weightT = parseFloat(document.getElementById('weightT').value);
        const ampOT = parseFloat(document.getElementById('ampOT').value);
        const phaseOT = parseFloat(document.getElementById('phaseOT').value);

        if (isNaN(ampO) || isNaN(phaseO) || isNaN(weightT) || isNaN(ampOT) || isNaN(phaseOT)) {
            alert("모든 값을 정확히 입력해주세요!");
            return;
        }

        // 2. 벡터 계산 (Polar to Cartesian)
        // 수학적 계산을 위해 각도를 라디안으로 변환 (JS는 라디안 사용)
        // 일반적인 진동 분석기 기준 (상단 0도, 시계방향이 +라고 가정할 수도 있으나, 
        // 여기서는 수학적 표준인 우측 0도, 반시계 + 기준으로 계산 후 시각화만 조정)
        
        const radO = phaseO * (Math.PI / 180);
        const radOT = phaseOT * (Math.PI / 180);

        // 벡터 O 좌표
        const Ox = ampO * Math.cos(radO);
        const Oy = ampO * Math.sin(radO);

        // 벡터 O+T 좌표
        const OTx = ampOT * Math.cos(radOT);
        const OTy = ampOT * Math.sin(radOT);

        // 벡터 T (Effect Vector) = (O+T) - O
        const Tx = OTx - Ox;
        const Ty = OTy - Oy;

        // 벡터 T의 진폭과 위상 구하기
        const ampT = Math.sqrt(Tx * Tx + Ty * Ty);
        let phaseT = Math.atan2(Ty, Tx) * (180 / Math.PI);
        if (phaseT < 0) phaseT += 360;

        // 3. 교정 중량 계산
        // 공식: 교정중량 = 시험중량 * (O길이 / T길이)
        const corrWeight = weightT * (ampO / ampT);

        // 4. 각도 이동 계산
        // 네가 준 로직: "벡터 O와 벡터 T 사이의 각도 측정"
        // 이동해야 할 각도 = Phase(T) - Phase(O)
        // 만약 결과가 양수면 T가 O보다 앞서 있음 -> 뒤로(반대) 돌려야 함
        let angleDiff = phaseT - phaseO;
        
        // 각도 정규화 (-180 ~ 180)
        while (angleDiff > 180) angleDiff -= 360;
        while (angleDiff <= -180) angleDiff += 360;

        // 작업 지시 생성
        let directionStr = "";
        let moveAngle = Math.abs(angleDiff);
        
        // 벡터 T를 O의 반대편(180도)으로 보내야 함.
        // 현재 로직: 시험 중량 위치 기준에서 이동
        // 계산된 angleDiff만큼 시험 웨이트를 "회전 반대 방향"으로 이동해야 벡터가 일치됨 (Lag 개념 적용 시)
        // 하지만 시각적/기하학적으로 단순히 설명하면:
        if (angleDiff > 0) {
            directionStr = `시험 중량 위치에서 <b>회전 반대 방향(Lag)</b>으로 <b>${moveAngle.toFixed(1)}°</b> 이동`;
        } else {
            directionStr = `시험 중량 위치에서 <b>회전 방향(Lead)</b>으로 <b>${moveAngle.toFixed(1)}°</b> 이동`;
        }
        
        // 간단한 텍스트 (사용자 입력값 기반 설명)
        // 네가 준 설명: "T가 O 쪽으로 가기 위해 필요한 회전 방향을 따른다"
        
        // 5. 결과 출력
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('resWeight').innerText = corrWeight.toFixed(2) + " g (또는 입력 단위)";
        document.getElementById('resAngleDiff').innerText = `${moveAngle.toFixed(1)}° (${angleDiff > 0 ? "T가 O보다 앞섬" : "T가 O보다 뒤짐"})`;
        document.getElementById('resInstruction').innerHTML = 
            `시험 중량을 부착했던 위치에서<br>👉 ${angleDiff > 0 ? "반시계 방향(CCW)" : "시계 방향(CW)"}으로 <b>${moveAngle.toFixed(1)}°</b> 이동하여 부착하세요.<br>(*단, 위상각 측정 기준에 따라 방향 확인 필요)`;

        // 6. 캔버스에 그리기
        drawGraph(ampO, phaseO, ampOT, phaseOT, ampT, phaseT, Tx, Ty, Ox, Oy, OTx, OTy);
    }

    function drawGraph(ampO, phaseO, ampOT, phaseOT, ampT, phaseT, Tx, Ty, Ox, Oy, OTx, OTy) {
        const canvas = document.getElementById('vectorGraph');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const cx = width / 2;
        const cy = height / 2;

        // 캔버스 초기화
        ctx.clearRect(0, 0, width, height);

        // 스케일 조정 (화면에 꽉 차게)
        const maxAmp = Math.max(ampO, ampOT) * 1.2;
        const scale = (width / 2 - 20) / maxAmp;

        // 그리드 그리기 (원)
        ctx.strokeStyle = '#eee';
        ctx.beginPath();
        ctx.arc(cx, cy, (width/2 - 20) * 0.33, 0, 2*Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, (width/2 - 20) * 0.66, 0, 2*Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, (width/2 - 20), 0, 2*Math.PI);
        ctx.stroke();
        
        // 십자선
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(width, cy); ctx.stroke();

        // 벡터 그리기 함수
        function drawVector(x, y, color, label, isDashed = false, startX = cx, startY = cy) {
            ctx.beginPath();
            if(isDashed) ctx.setLineDash([5, 3]);
            else ctx.setLineDash([]);
            
            ctx.moveTo(startX, startY);
            // Y축 뒤집기 (캔버스는 아래가 +Y, 그래프는 위가 +Y)
            let drawX = startX + x * scale;
            let drawY = startY - y * scale; 
            
            ctx.lineTo(drawX, drawY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // 화살표 머리
            const headlen = 10;
            const angle = Math.atan2(-y, x);
            ctx.beginPath();
            ctx.moveTo(drawX, drawY);
            ctx.lineTo(drawX - headlen * Math.cos(angle - Math.PI / 6), drawY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(drawX - headlen * Math.cos(angle + Math.PI / 6), drawY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fillStyle = color;
            ctx.fill();
            
            // 라벨
            ctx.fillStyle = "#333";
            ctx.font = "12px Arial";
            ctx.fillText(label, drawX + 5, drawY);
        }

        // 1. 벡터 O (Blue)
        drawVector(Ox, Oy, 'blue', `O (${phaseO}°)`);

        // 2. 벡터 O+T (Green)
        drawVector(OTx, OTy, 'green', `O+T (${phaseOT}°)`);

        // 3. 벡터 T (Red, Dashed) - O의 끝에서 O+T의 끝으로
        // 시작점은 O의 끝점
        // 실제 그릴 때는 (Ox, Oy) 위치에서 (Tx, Ty) 만큼 이동
        // 캔버스 좌표계 변환 필요
        let startX_T = cx + Ox * scale;
        let startY_T = cy - Oy * scale;
        
        // drawVector 함수를 약간 수정하거나 직접 그림
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(startX_T, startY_T);
        let endX_T = cx + OTx * scale;
        let endY_T = cy - OTy * scale;
        ctx.lineTo(endX_T, endY_T);
        ctx.strokeStyle = 'red';
        ctx.stroke();

        // T 화살표 머리 (O+T 끝점에)
        const angleT = Math.atan2(-(OTy - Oy), (OTx - Ox));
        const headlen = 10;
        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.moveTo(endX_T, endY_T);
        ctx.lineTo(endX_T - headlen * Math.cos(angleT - Math.PI / 6), endY_T - headlen * Math.sin(angleT - Math.PI / 6));
        ctx.lineTo(endX_T - headlen * Math.cos(angleT + Math.PI / 6), endY_T - headlen * Math.sin(angleT + Math.PI / 6));
        ctx.fillStyle = 'red';
        ctx.fill();
        
        ctx.fillStyle = 'red';
        ctx.fillText("T", (startX_T + endX_T)/2 + 10, (startY_T + endY_T)/2);
    }
</script>

</body>
</html>
